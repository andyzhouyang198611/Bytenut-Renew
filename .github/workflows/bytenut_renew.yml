name: Bytenut-Renew

on:
  workflow_dispatch:
  schedule:
    # 每天在以下时间点执行，间隔约为 100 分钟 (1小时40分钟)
    
    # 00:00, 05:00, 10:00, 15:00, 20:00 (UTC)
    - cron: '0 0,5,10,15,20 * * *'
    
    # 01:40, 06:40, 11:40, 16:40, 21:40 (UTC)
    - cron: '40 1,6,11,16,21 * * *'
    
    # 03:20, 08:20, 13:20, 18:20, 23:20 (UTC)
    - cron: '20 3,8,13,18,23 * * *'

jobs:
  run_bytenut_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 检出当前代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          BYTENUT_ACCOUNTS: ${{ secrets.BYTENUT_ACCOUNTS }}
          BYTENUT_COOKIES: ${{ secrets.BYTENUT_COOKIES }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          # 使用 xvfb 虚拟显示器运行脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python bytenut_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3
          include-hidden-files: false
